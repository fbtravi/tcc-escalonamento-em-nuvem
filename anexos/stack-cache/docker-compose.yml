# Stack de demonstração do TCC: Redis (cache-aside) + App Node.js + Nginx (cache HTTP)
# Suba tudo com: docker compose up --build
# Acesse pela porta do Nginx: http://localhost:8080/api/v1/odds/10

services:
  redis:
    image: redis:7-alpine
    container_name: tcc-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: ./app
    container_name: tcc-node-app
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL_SECONDS=90
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: tcc-nginx
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
